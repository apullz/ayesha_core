name: Build Ayesha Core APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    # 1. upgraded to v4 for clean, modern workspace checkouts desu!
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # 2. optimized system package arrays for buildozer compilation
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          openjdk-17-jdk-headless \
          libncurses5 \
          libstdc++6 \
          zip \
          unzip
    
    # 3. clear out old manual sdk blocks; buildozer handles its own tracking dirs!
    - name: Build APK with buildozer
      run: |
        buildozer android debug
    
    # 4. FIXED! upgraded to v4 to clear that hard deprecation block kapoo!
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ayesha-core-apk
        path: bin/*.apk

    # 5. FIXED! swapped archived release tool for modern software standard desu!
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: bin/*.apk
        name: Ayesha Core ${{ github.ref_name }}
        body: Automated APK build matrix compiled by Ayesha Core Pipeline.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}